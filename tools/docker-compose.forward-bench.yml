services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "${BENCH_PG_BIND:-127.0.0.1}:${BENCH_PG_PORT:-15432}:5432"
    environment:
      - POSTGRES_USER=${BENCH_POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${BENCH_POSTGRES_PASSWORD:-sub2api-bench-pass}
      - POSTGRES_DB=${BENCH_POSTGRES_DB:-sub2api}
      - PGDATA=/var/lib/postgresql/data
      - TZ=${BENCH_TZ:-UTC}
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BENCH_POSTGRES_USER:-sub2api} -d ${BENCH_POSTGRES_DB:-sub2api}"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s

  redis:
    image: redis:8-alpine
    ports:
      - "${BENCH_REDIS_BIND:-127.0.0.1}:${BENCH_REDIS_PORT:-16379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s
